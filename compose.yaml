services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: oldmarket
      MYSQL_USER: oldmarket
      MYSQL_PASSWORD: oldmarket
      MYSQL_ROOT_PASSWORD: root
    volumes: [mysql-data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: oldmarket
      MINIO_ROOT_PASSWORD: oldmarket-secret
    volumes: [minio-data:/data]
  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: ["/bin/sh", "-c", "until mc alias set local http://minio:9000 oldmarket oldmarket-secret; do sleep 1; done; mc mb -p local/oldmarket"]
  backend:
    build: .
    depends_on:
      mysql: {condition: service_healthy}
      minio-init: {condition: service_completed_successfully}
    environment:
      DB_URL: jdbc:mysql://mysql:3306/oldmarket?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: oldmarket
      DB_PASSWORD: oldmarket
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS:-http://localhost:8088}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: oldmarket
      MINIO_SECRET_KEY: oldmarket-secret
      MINIO_BUCKET: oldmarket
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
  frontend:
    build: ./frontend
    depends_on: [backend]
    ports: ["8088:80"]
volumes:
  mysql-data:
  minio-data:

server {
  listen 80;
  root /usr/share/nginx/html;
  client_max_body_size 16m;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob:; style-src 'self'; script-src 'self'; connect-src 'self'" always;
  location /api/ { proxy_pass http://backend:8080; }
  location /actuator/ { proxy_pass http://backend:8080; }
  location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
  location = /index.html { add_header Cache-Control "no-store"; }
  location / { try_files $uri $uri/ /index.html; }
}
